<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Level 5: The Python Bridge</title>
    <style>
        body { font-family: sans-serif; margin: 40px; background: #f4f4f4; }
        .menu-container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .pizza-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        button { background: #2ed573; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .status { color: #007bff; font-weight: bold; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>

    <div class="menu-container">
        <h2>🍕 Flask Pizza Server Sync</h2>
        <p class="status" id="server-status">Waiting for user interaction...</p>
        <hr>

        <div class="pizza-row">
            <span>Classic Margherita ($12)</span>
            <form class="pizza-form" action="/menu/add/5" method="POST">
                <button type="submit">Add to Cart</button>
            </form>
        </div>
    </div>

    <script>
        const btn = document.querySelectorAll('.pizza-form')
        let status = document.getElementById('server-status')
        btn.forEach(function(btn){
            btn.addEventListener('submit',runEvent)
        })

        function runEvent(e){
            e.preventDefault()
            let url = e.target.action
            status.innerHTML = "Intercepted! Sending background fetch request to: " + url;
            fetch(url, { method : 'POST'}).then((responce) => {
                console.log('success',responce);
                return responce.json();
            }).then((data) =>{
                console.log(data);
            }).catch((err) => {
                console.log('error',err);
            })
        }

    </script>

</body>
</html>
